<!DOCTYPE html>
<html lang="en">        

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

 <!-- Sebastian David Aguilar Pulido 1029143082 -->
  
  <script src="variables.js"></script>
 
  <section class="formulario">
    <div class="formulario-contenido">

     <form action="#" method="post">
       <h1 class="titulo">Calculo de Nómina</h1>
       <label for="nombreCompleto">Nombre Completo:</label>
       <input type="text" id="nombreCompleto" name="nombre" minlength="8" maxlength="260" required>

        <div class="fila">
          <div class="campo">
            <label for="edad">Edad</label>
            <input type="number" id="edad" name="edad" min="15" max="100" required>
          </div>

          <div class="campo">
            <label for="td">TD</label>
            <input type="text" id="td" name="td" minlength="2" maxlength="28" required>
          </div>
        </div>

       <label for="numeroDeDocumento">Número de Documento:</label>
       <input type="text" id="numeroDeDocumento" name="numeroDeDocumento" minlength="6" maxlength="10" required>

       <label for="salario">Salario:</label>
       <input type="number" id="salario" name="salario" min="1750905" max="9999999999" required>

       <div class="fila">
          <div class="campo">
            <label for="comisiones">Comisiones</label>
            <input type="number" id="comisiones" name="comisiones" min="0" required>
          </div>

          <div class="campo">
            <label for="totalHorasExtra">Horas Extra</label>
            <input type="number" id="totalHorasExtra" name="totalHorasExtra" min="0" max="48" required>
          </div>
        </div>

       <label for="nivelDeRiesgo">Nivel de Riesgo:</label>

       <select id="nivelDeRiesgo" name="nivelDeRiesgo" required>
         <option value="">Seleccione un nivel</option>
         <option value="minimo">0.522 (Mínimo)</option>
         <option value="bajo">1.044 (Bajo)</option>
         <option value="medio">2.436 (Medio)</option>
         <option value="alto">4.350 (Alto)</option>
         <option value="muyAlto">6.960 (Muy Alto)</option>
       </select>

       <button type="submit">Calcular</button>
     </form>
    </div>
  </section>
     

</body>
</html>
