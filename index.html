<!DOCTYPE html>
<html lang="en">        

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

 <!-- Sebastian David Aguilar Pulido 1029143082 -->
  
  <section class = "contenedor" id="contenedor">

    <section class="resultado">
      <div class="resultadoNomina">
        <h1>Resultado de nómina</h1>
        <p id="salarioFinal"></p>
        <p id="ibc"></p>
        <p id="deducciones"></p>
        <p id="total"></p>
      </div>
    </section>

    <section class="formulario">
      <div class="formulario-contenido">

        <form action="#" method="post">
          <h1>Calculo de Nómina</h1>
          <label for="nombreCompleto">Nombre Completo:</label>
          <input type="text" id="nombreCompleto" name="nombre" minlength="8" maxlength="260" required placeholder="Nombre Completo">

            <div class="fila">
              <div class="campo">
                <label for="edad">Edad</label>
                <input type="number" id="edad" name="edad" min="15" max="100" required placeholder="25">
              </div>

              <div class="campo">
                <label for="td">TD</label>
                <input type="text" id="td" name="td" minlength="2" maxlength="28" required placeholder="CC, CE, NIT, etc.">
              </div>
            </div>

          <label for="numeroDeDocumento">Número de Documento:</label>
          <input type="text" id="numeroDeDocumento" name="numeroDeDocumento" minlength="6" maxlength="10" required placeholder="Número de Documento">

          <label for="salario">Salario (COP):</label>
          <input type="number" id="salario" name="salario" min="1750905" max="9999999999" required placeholder="1750905">

          <div class="fila">
              <div class="campo">
                <label for="comisiones">Comisiones</label>
                <input type="number" id="comisiones" name="comisiones" min="0" required placeholder="0">
              </div>

              <div class="campo">
                <label for="totalHorasExtra">Horas Extra</label>
                <input type="number" id="totalHorasExtra" name="totalHorasExtra" min="0" max="48" required placeholder="0">
              </div>
            </div>

          <label for="nivelDeRiesgo">Nivel de Riesgo:</label>

          <select id="nivelDeRiesgo" name="nivelDeRiesgo" required>
            <option value="">Seleccione un nivel</option>
            <option value="minimo">0.522 (Mínimo)</option>
            <option value="bajo">1.044 (Bajo)</option>
            <option value="medio">2.436 (Medio)</option>
            <option value="alto">4.350 (Alto)</option>
            <option value="muyAlto">6.960 (Muy Alto)</option>
          </select>
        </form>
      </div>
    </section>
      
    <section class="mensajes">
      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-right">
            <h1 class="titulo">Bienvenido al sistema de nómina</h1>
            <p>Ingresa tus datos para calcular tu nómina.</p>
            <button type="submit" id="calcular">Calcular nómina</button>
          </div>

          <div class="overlay-panel overlay-left">
            <h1 class="titulo">Cálculo de nómina listo</h1>
            <p>Los datos han sido procesados correctamente. Puedes revisar el resultado o realizar un nuevo cálculo.</p>
            <button type="submit" id="recalcular">Recalcular nómina</button>
          </div>
        </div>
      </div>
    </section>
 </section>

  <script src="variables.js"></script>
 
</body>
</html>
