<!DOCTYPE html>
<html lang="en">        

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

  <script src="variables.js"></script>

  <section class="formulario">
    <div class="formulario-contenido">
        <form action="#" method="post">
          <label for="nombre">Primer nombre:</label>
          <input type="text" id="nombre" name="nombre" required>

          <label for="edad">Edad:</label>
          <input type="number" id="edad" name="edad" required>

          <label for="td">Tarjeta de Identidad</label>
          <input type="text" id="td" name="td" required>

          <label for="numeroDeDocumento">Número de Documento:</label>
          <input type="text" id="numeroDeDocumento" name="numeroDeDocumento" required>

          <label for="salario">Salario:</label>
          <input type="number" id="salario" name="salario" required>

          <label for="comisiones">Comisiones:</label>
          <input type="number" id="comisiones" name="comisiones" required>

          <label for="totalHorasExtra">Horas Extra:</label>
          <input type="number" id="totalHorasExtra" name="totalHorasExtra" required>

          <label for="nivelDeRiesgo">Nivel de Riesgo:</label>
          <select id="nivelDeRiesgo" name="nivelDeRiesgo" required>
            <option value="">Seleccione un nivel</option>
            <option value="minimo">Mínimo</option>
            <option value="bajo">Bajo</option>
            <option value="medio">Medio</option>
            <option value="alto">Alto</option>
            <option value="muyAlto">Muy Alto</option>
          </select>

          <button type="submit">Calcular</button>
        </form>
      </div>
    </div>
  </section>
    
</body>
</html>
